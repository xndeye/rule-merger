name: rule merger

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:


jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Mihomo latest
        run: |
          LATEST_TAG=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/latest/download/version.txt)
          curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_TAG}/mihomo-linux-amd64-${LATEST_TAG}.gz
          gunzip mihomo.gz
          sudo mv mihomo /usr/local/bin/
          sudo chmod +x /usr/local/bin/mihomo
          mihomo -v

      - name: Set up sing-box v1.13.13
        run: |
          VERSION=1.13.13
          curl -fsSL -o sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: Run script
        run: python rule_merger.py

      - name: Clean up
        run: |
          find . -maxdepth 1 ! -name 'output' ! -name '.' ! -name '.git' -exec rm -rf {} +
          mv output/* .
          rm -rf output

      - name: Get current time
        id: time
        run: echo "TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 🚀 Update at ${{ steps.time.outputs.TIME }}
          branch: release
          skip_dirty_check: true
          push_options: '--force'
          create_branch: true
          skip_fetch: true
          skip_checkout: true
          commit_options: '--allow-empty'

